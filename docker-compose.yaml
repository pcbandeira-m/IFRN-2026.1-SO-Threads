services:
  servidor:
    # Em vez de 'image:', dizemos ao Docker para construir a partir do nosso Dockerfile
    build:
      context: .
      dockerfile: servidor/Dockerfile
    container_name: servidor-elixir
    environment:
      - PORT=5000
    ports:
      - "5000:5000"

  cliente:
    build:
      context: .
      dockerfile: cliente/Dockerfile
    environment:
      - HOST=servidor-elixir
      - PORT=5000
    # Mantém o terminal aberto para conseguirmos digitar as mensagens
    stdin_open: true
    tty: true